services:
  backend:
    image: ${DOCKERHUB_USER}/${REPO_PREFIX}-backend:${TAG:-latest}
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
    restart: always

  frontend:
    image: ${DOCKERHUB_USER}/${REPO_PREFIX}-frontend:${TAG:-latest}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: always
